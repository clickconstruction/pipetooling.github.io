<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service icons — Plumbing, Electrical, HVAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* Matches main hero backdrop so card + icon colors read the same */
        .hero-backdrop {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.4)), url('1339089830.jpg');
            background-size: cover;
            background-position: center;
        }

        .hero-backdrop::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.8), rgba(59, 130, 246, 0.6));
            z-index: 1;
        }

        .hero-backdrop-inner {
            position: relative;
            z-index: 2;
            padding: 2rem 20px;
        }

        .service-icons {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .service-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
            min-width: 150px;
        }

        .service-icon:hover {
            transform: translateY(-5px);
        }

        .service-icon i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #e17235;
        }

        .service-icon span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .service-icon.electrical-icon i {
            color: #FFD700;
        }

        .service-icon.hvac-icon i {
            color: #06b6d4;
        }

        @media (max-width: 768px) {
            .service-icons {
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
            }

            .service-icon {
                min-width: 120px;
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .service-icon {
                min-width: 100px;
                padding: 1rem;
            }

            .service-icon i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero-backdrop" aria-label="Service highlights">
        <div class="hero-backdrop-inner">
            <div class="service-icons">
                <div class="service-icon">
                    <i class="fas fa-wrench" aria-hidden="true"></i>
                    <span>Plumbing</span>
                </div>
                <div class="service-icon electrical-icon">
                    <i class="fas fa-bolt" aria-hidden="true"></i>
                    <span>Electrical</span>
                </div>
                <div class="service-icon hvac-icon">
                    <i class="fas fa-thermometer-half" aria-hidden="true"></i>
                    <span>HVAC</span>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
