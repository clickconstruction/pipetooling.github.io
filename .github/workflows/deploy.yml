name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migrations (unique versions + valid names)
        run: bash scripts/check-migrations.sh

      - name: Workflow check parity (ci.yml == deploy.yml)
        run: node scripts/check-workflow-parity.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Theme token check
        run: node scripts/theme-tokenize.mjs --check src

      - name: App calendar timezone check
        run: npm run check:timezone

      - name: Test
        run: npm test
        env:
          # Unit tests don't hit Supabase, but src/lib/supabase.ts throws at import
          # if these are unset. Dummy non-empty values satisfy the guard.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-dummy-anon-key

  build:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check environment variables
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "::error::VITE_SUPABASE_URL secret is not set in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY secret is not set in repository settings"
            exit 1
          fi
          echo "Environment variables are set (values hidden for security)"

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Verify build output
        run: |
          echo "Verifying build output..."
          echo "Contents of dist directory:"
          ls -la dist/ || true
          echo ""
          if [ ! -f dist/.nojekyll ]; then
            echo "::error::.nojekyll file is missing from dist directory"
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "::error::index.html is missing from dist directory"
            exit 1
          fi
          if [ ! -f dist/404.html ]; then
            echo "::error::404.html is missing — vite copy-404 plugin should copy index.html for GitHub Pages SPA paths"
            exit 1
          fi
          echo "Contents of dist/index.html:"
          cat dist/index.html
          echo ""
          if ! grep -q "assets/index-" dist/index.html; then
            echo "::error::index.html does not reference built assets correctly"
            exit 1
          fi
          if grep -q "main.tsx" dist/index.html; then
            echo "::error::index.html still references source file main.tsx"
            exit 1
          fi
          echo "✓ Build output verified: .nojekyll present, index.html references built assets"

      # One release of asset overlap: a tab still running the just-superseded build can
      # keep fetching its hashed route chunks instead of 404ing (which triggers the
      # v2.811 auto-reload). The live site's sw.js embeds the precache manifest of the
      # CURRENT deploy's own build only — merged-in older assets are never listed — so
      # pulling from it carries exactly one deploy of history, with no accumulation.
      # Best-effort: a fetch failure must never block the deploy.
      - name: Merge previous deploy's assets (one release of overlap)
        run: |
          SITE_URL="https://$(cat CNAME)"
          echo "Fetching live SW precache manifest from $SITE_URL/sw.js..."
          if ! curl -fsSL --max-time 30 "$SITE_URL/sw.js" -o /tmp/live-sw.js; then
            echo "::warning::Could not fetch live sw.js — skipping asset overlap (first deploy or site unreachable)"
            exit 0
          fi
          PREV_ASSETS=$(grep -oE 'assets/[A-Za-z0-9._-]+' /tmp/live-sw.js | sort -u)
          if [ -z "$PREV_ASSETS" ]; then
            echo "::warning::No assets found in live sw.js manifest — skipping asset overlap"
            exit 0
          fi
          mkdir -p dist/assets
          total=0; merged=0; kept=0; failed=0
          for a in $PREV_ASSETS; do
            total=$((total + 1))
            if [ -f "dist/$a" ]; then
              kept=$((kept + 1))
              continue
            fi
            if curl -fsSL --max-time 30 "$SITE_URL/$a" -o "dist/$a"; then
              merged=$((merged + 1))
            else
              rm -f "dist/$a"
              failed=$((failed + 1))
              echo "::warning::Failed to fetch previous asset $a — stale clients needing it will 404 (auto-recovery reload covers them)"
            fi
          done
          echo "Asset overlap: $total previous assets — $merged merged, $kept already in new build, $failed failed"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # deploy-pages max wait is 600000 ms (10m); omit timeout to use default.
          reporting_interval: 10000
