name: E2E Smoke

# Tier-1 read-only smoke suite against the deployed production site
# (docs/E2E_SMOKE.md). Deliberately NON-GATING: it never runs on pull
# requests and does not block merges — it runs after each Pages deploy,
# nightly, and on demand. Promote it to a gate only after it proves stable.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'
  workflow_run:
    workflows: ['Deploy to GitHub Pages']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: e2e-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke suite against production
        run: npx playwright test
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_BASE_URL: https://pipetooling.com
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
