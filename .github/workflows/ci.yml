name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migrations (unique versions + valid names)
        run: bash scripts/check-migrations.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Theme token check
        run: node scripts/theme-tokenize.mjs --check src

      - name: Test
        run: npm test
        env:
          # Unit tests don't hit Supabase, but src/lib/supabase.ts throws at import
          # if these are unset. Dummy non-empty values satisfy the guard.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-dummy-anon-key
