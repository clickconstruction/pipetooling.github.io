<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <title>PipeTooling</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var k = 'pipetooling-hard-reload-restore'
          var raw = sessionStorage.getItem(k)
          if (!raw) return
          sessionStorage.removeItem(k)
          var o = JSON.parse(raw)
          var path =
            (o.pathname || '/') + (o.search == null ? '' : o.search) + (o.hash == null ? '' : o.hash)
          var cur = location.pathname + location.search + location.hash
          if (path !== cur) history.replaceState(null, '', path)
        } catch (e) {
          /* ignore */
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
